<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Download Shinobi Online and follow public release updates.">
    <title>Shinobi Online</title>
    <link rel="preload" href="/assets/shinobi-online-hero.webp" as="image" type="image/webp">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <img class="hero__image" src="/assets/shinobi-online-hero.webp" width="1672" height="941" alt="" fetchpriority="high">
        <div class="hero__veil"></div>
        <div class="hero__content">
          <p class="eyebrow">A Naruto based online game</p>
          <h1 id="page-title">Shinobi Online</h1>
          <p class="lede">Download the latest public build.</p>

          <div class="download-panel" aria-label="Latest Shinobi Online download">
            <div class="download-panel__head">
              <div class="download-panel__version">
                <span class="label">Current version</span>
                <strong id="release-version">Loading</strong>
              </div>
              <p id="download-copy">Checking the latest release.</p>
            </div>

            <a class="button button--download is-disabled" id="download-link" href="https://github.com/frizas/shinobi-online/releases" aria-disabled="true">Checking download</a>

            <dl class="release-grid">
              <div>
                <dt>Installer</dt>
                <dd id="release-installer">Loading</dd>
              </div>
              <div>
                <dt>Size</dt>
                <dd id="release-size">Loading</dd>
              </div>
              <div>
                <dt>Leaf</dt>
                <dd id="server-status">Loading</dd>
              </div>
              <div>
                <dt>Requires</dt>
                <dd id="compatibility-summary">Windows 10+ x64, OpenGL</dd>
              </div>
            </dl>

            <p class="release-meta" id="release-meta" hidden></p>
          </div>

          <footer class="site-footer" aria-label="Public links">
            <a id="release-notes-link" href="https://github.com/frizas/shinobi-online/releases">Release notes</a>
            <a href="https://github.com/frizas/shinobi-online">GitHub</a>
          </footer>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
