<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Shinobi Online - a Naruto based online game. Download now!">
    <meta name="application-name" content="Shinobi Online">
    <meta name="apple-mobile-web-app-title" content="Shinobi Online">
    <meta name="theme-color" content="#05080a">
    <meta property="og:site_name" content="Shinobi Online">
    <meta property="og:title" content="Shinobi Online">
    <meta property="og:description" content="Shinobi Online - a Naruto based online game. Download now!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shinobionline.vercel.app/">
    <meta property="og:image" content="https://shinobionline.vercel.app/assets/shinobi-online-logo.png">
    <meta property="og:image:secure_url" content="https://shinobionline.vercel.app/assets/shinobi-online-logo.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">
    <meta property="og:image:alt" content="Shinobi Online leaf logo">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Shinobi Online">
    <meta name="twitter:description" content="Shinobi Online - a Naruto based online game. Download now!">
    <meta name="twitter:image" content="https://shinobionline.vercel.app/assets/shinobi-online-logo.png">
    <meta name="twitter:image:alt" content="Shinobi Online leaf logo">
    <link rel="canonical" href="https://shinobionline.vercel.app/">
    <title>Shinobi Online - a Naruto based online game</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/shinobi-online-icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preload" href="/assets/shinobi-online-hero.webp" as="image" type="image/webp">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <img class="hero__image" src="/assets/shinobi-online-hero.webp" width="1672" height="941" alt="" fetchpriority="high">
        <div class="hero__veil"></div>
        <div class="hero__content">
          <p class="eyebrow">A Naruto based online game</p>
          <h1 id="page-title">Shinobi Online</h1>
          <p class="lede">Download the latest public build.</p>

          <div class="download-panel" aria-label="Latest Shinobi Online download">
            <div class="download-panel__head">
              <div class="download-panel__version">
                <span class="label">Current version</span>
                <strong id="release-version">Loading</strong>
              </div>
              <p id="download-copy">Checking the latest release.</p>
            </div>

            <a class="button button--download is-disabled" id="download-link" href="https://github.com/frizas/shinobi-online/releases" aria-disabled="true">Checking download</a>

            <dl class="release-grid">
              <div>
                <dt>Installer</dt>
                <dd id="release-installer">Loading</dd>
              </div>
              <div>
                <dt>Size</dt>
                <dd id="release-size">Loading</dd>
              </div>
              <div>
                <dt>Leaf</dt>
                <dd id="server-status">Loading</dd>
              </div>
              <div>
                <dt>Requires</dt>
                <dd id="compatibility-summary">Windows 10+ x64, OpenGL</dd>
              </div>
            </dl>

            <p class="release-meta" id="release-meta" hidden></p>
          </div>

          <footer class="site-footer" aria-label="Public links">
            <a id="release-notes-link" href="https://github.com/frizas/shinobi-online/releases">Release notes</a>
            <a href="https://github.com/frizas/shinobi-online">GitHub</a>
          </footer>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
